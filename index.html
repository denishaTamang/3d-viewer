<!DOCTYPE html>
<html>
<head>
    <title>3D Animation Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; }
        .info { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 8px; pointer-events: none; z-index: 100; }
        .upload-btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: #00aaff; color: white; padding: 12px 24px; border-radius: 30px; cursor: pointer; border: none; z-index: 100; font-weight: bold; }
        .upload-btn:hover { background: #0088cc; }
    </style>
</head>
<body>
    <div class="info">
    <h2> Interactive 3D Viewer</h2>
    <p>Drag to orbit • Scroll to zoom</p>
    <p style="margin-top: 8px; font-size: 14px; color: #88aaff;"> Created by Denisha Tamang</p>
</div>
    <input type="file" id="fileInput" accept=".glb,.gltf" style="display: none">
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📁 Upload GLB Model</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2;
        controls.enableZoom = true;
        controls.enablePan = true;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(2, 5, 3);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(-2, 1, 2);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa66, 0.3);
        backLight.position.set(0, 1, -3);
        scene.add(backLight);
        
        const rimLight = new THREE.PointLight(0xff8866, 0.5);
        rimLight.position.set(1, 2, -2);
        scene.add(rimLight);

        // Helper grid
        const gridHelper = new THREE.GridHelper(10, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -1;
        scene.add(gridHelper);
        
        // Floating particles
        const particleCount = 800;
        const particlesGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 30;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 15;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 20 - 5;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particlesMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.05, transparent: true, opacity: 0.6 });
        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);
        
        // Stars background
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1500;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.08, transparent: true, opacity: 0.4 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        let currentModel = null;
        
        // Load a default sample model (rotating torus knot)
        const defaultGeometry = new THREE.TorusKnotGeometry(0.8, 0.25, 128, 16, 3, 4);
        const defaultMaterial = new THREE.MeshStandardMaterial({ color: 0x66aaff, metalness: 0.7, roughness: 0.3, emissive: 0x113355 });
        const defaultModel = new THREE.Mesh(defaultGeometry, defaultMaterial);
        defaultModel.castShadow = true;
        defaultModel.receiveShadow = true;
        scene.add(defaultModel);
        currentModel = defaultModel;
        
        // GLTF Loader for user uploads
        const loader = new GLTFLoader();
        
        document.getElementById('fileInput').addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file && (file.name.endsWith('.glb') || file.name.endsWith('.gltf'))) {
                const url = URL.createObjectURL(file);
                loader.load(url, (gltf) => {
                    if (currentModel && currentModel !== defaultModel) {
                        scene.remove(currentModel);
                    }
                    if (currentModel === defaultModel) {
                        scene.remove(defaultModel);
                    }
                    const model = gltf.scene;
                    model.scale.set(1, 1, 1);
                    model.position.set(0, 0, 0);
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    scene.add(model);
                    currentModel = model;
                    controls.autoRotate = true;
                    URL.revokeObjectURL(url);
                }, undefined, (error) => {
                    console.error('Error loading model:', error);
                    alert('Could not load model. Make sure it\'s a valid GLB/GLTF file.');
                });
            } else {
                alert('Please upload a .glb or .gltf file');
            }
        });
        
        // Animation loop
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            
            // Floating animation for default model
            if (currentModel === defaultModel) {
                defaultModel.rotation.y = time * 0.8;
                defaultModel.rotation.x = Math.sin(time * 0.5) * 0.2;
                defaultModel.position.y = Math.sin(time * 1.2) * 0.1;
            }
            
            // Particles floating motion
            particles.rotation.y = time * 0.05;
            stars.rotation.x = time * 0.02;
            
            controls.update(); // Update controls (auto-rotate if enabled)
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log('3D Viewer Ready! Upload any GLB file.');
    </script>
</body>
</html>
