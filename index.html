<!DOCTYPE html>
<html>
<head>
    <title>3D Viewer - Denisha Tamang</title>
    <style>
        .profile-pic {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    margin-top: 10px;
    border: 2px solid #00aaff;
    object-fit: cover;
}
        body { margin: 0; overflow: hidden; font-family: Arial; }
        .info { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: white; 
            background: rgba(0,0,0,0.7); 
            padding: 10px 20px; 
            border-radius: 8px; 
            pointer-events: none; 
            z-index: 100; 
        }
        .upload-btn { 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #00aaff; 
            color: white; 
            padding: 12px 24px; 
            border-radius: 30px; 
            cursor: pointer; 
            border: none; 
            z-index: 100; 
            font-weight: bold; 
        }
        .upload-btn:hover { background: #0088cc; }
    </style>
</head>
<body>
    <<div class="info">
    <h2>Interactive 3D Viewer</h2>
    <p>Drag to orbit • Scroll to zoom</p>
    <img src="denisha.jpg" style="width: 60px; height: 60px; border-radius: 50%; border: 2px solid #00aaff;">
    <p> Created by <strong>Denisha Tamang</strong></p>
</div>
    <input type="file" id="fileInput" accept=".glb,.gltf" style="display: none">
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📁 Upload GLB Model</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Setup scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        
        // Setup camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 5);
        
        // Setup renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        
        // Simple Lights
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(2, 5, 3);
        scene.add(mainLight);
        
        // SIMPLE MODEL: A nice cube (works 100% always)
        const geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const material = new THREE.MeshStandardMaterial({ color: 0x66aaff, metalness: 0.5, roughness: 0.2 });
        const cube = new THREE.Mesh(geometry, material);
        cube.castShadow = true;
        scene.add(cube);
        
        // Add a simple sphere too
        const sphereGeo = new THREE.SphereGeometry(0.5, 32, 32);
        const sphereMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, metalness: 0.3 });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        sphere.position.set(1.2, -0.5, 0.5);
        scene.add(sphere);
        
        // Grid helper
        const gridHelper = new THREE.GridHelper(10, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -1;
        scene.add(gridHelper);
        
        // Simple stars background
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 500;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount; i++) {
            starsPositions[i*3] = (Math.random() - 0.5) * 200;
            starsPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starsPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);
        
        // Animation
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            // Rotate cube
            cube.rotation.x = time * 0.5;
            cube.rotation.y = time * 0.8;
            
            // Bob sphere
            sphere.position.y = -0.5 + Math.sin(time) * 0.2;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // GLTF Upload handler
        const loader = new GLTFLoader();
        document.getElementById('fileInput').addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file && (file.name.endsWith('.glb') || file.name.endsWith('.gltf'))) {
                const url = URL.createObjectURL(file);
                loader.load(url, (gltf) => {
                    // Remove current objects
                    scene.remove(cube);
                    scene.remove(sphere);
                    // Add new model
                    const model = gltf.scene;
                    model.scale.set(1, 1, 1);
                    scene.add(model);
                    URL.revokeObjectURL(url);
                    alert('Model loaded successfully!');
                }, undefined, (error) => {
                    alert('Error loading model. Please try a different file.');
                });
            } else {
                alert('Please upload .glb or .gltf file');
            }
        });
        
        console.log('3D Viewer Ready!');
    </script>
</body>
</html>
